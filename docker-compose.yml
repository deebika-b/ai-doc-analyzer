version: '3.8'

services:
  backend:
    build: .
    working_dir: /app
    # app.main:app tells uvicorn to look in the 'app' folder for 'main.py'
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app

  web:
    build: .
    user: root
    working_dir: /app
    # Points exactly to your 'streamlit_app.py' file
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend